---
# DopplerSecret lives in doppler-operator-system to reuse the existing
# doppler-token-secret (deployed from cluster.yaml via SOPS).
# The service token is already scoped to its project/config, so no explicit
# project/config fields are needed.
# Syncs jellyfin variables (JELLYFIN_USER, JELLYFIN_PASS, JELLYFIN_API)
# into a secret named 'jellyfin-secret' in the media namespace.
apiVersion: operator.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: jellyfin
  namespace: doppler-operator-system
spec:
  tokenSecret:
    name: doppler-token-secret
  managedSecret:
    name: jellyfin-secret
    namespace: media
    type: Opaque
