---
# NFS PersistentVolume for media files (movies, TV shows).
# Read-only to prevent accidental deletion or modification.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-media
  nfs:
    server: 10.0.40.2
    path: /media
