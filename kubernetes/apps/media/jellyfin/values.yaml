---
image:
  repository: jellyfin/jellyfin
  tag: "10.10.3"
  pullPolicy: IfNotPresent

service:
  main:
    type: ClusterIP
    ports:
      http:
        port: 8096

persistence:
  # Application config/data - on Ceph for durability and snapshotting
  config:
    enabled: true
    storageClass: cephfs
    size: 10Gi
    accessMode: ReadWriteOnce
  # Media library - NFS mount, read-only to protect source files
  media:
    enabled: true
    existingClaim: jellyfin-media
    readOnly: false

# Run as root to ensure full NFS share access
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

# Secrets from Doppler (JELLYFIN_USER, JELLYFIN_PASS, JELLYFIN_API)
envFrom:
  - secretRef:
      name: jellyfin-secret

# Jellyfin is slow to start, especially on first boot
livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 5

readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 5

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 2
    memory: 512Mi
