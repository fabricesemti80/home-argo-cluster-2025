---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: storage
  labels:
    app: nginx-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-test
  template:
    metadata:
      labels:
        app: nginx-test
    spec:
      containers:
        - name: nginx
          image: nginx:1.25.3
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-storage
              mountPath: "/usr/share/nginx/html"
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "<h1>Hello from Nginx on CephFS!</h1>" > /usr/share/nginx/html/index.html;
              echo "Storage Class: cephfs" >> /usr/share/nginx/html/index.html;
              echo "PVC Name: nginx-test-pvc" >> /usr/share/nginx/html/index.html;
              nginx -g 'daemon off;'
      volumes:
        - name: nginx-storage
          persistentVolumeClaim:
            claimName: nginx-test-pvc
