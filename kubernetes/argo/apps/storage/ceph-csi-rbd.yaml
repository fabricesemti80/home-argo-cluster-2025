---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ceph-csi-rbd
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/fabricesemti80/home-argo-cluster-2025.git"
      path: kubernetes/apps/storage/ceph-csi-rbd
      targetRevision: main
      ref: repo
    - repoURL: https://ceph.github.io/csi-charts
      chart: ceph-csi-rbd
      targetRevision: 3.14.0
      helm:
        releaseName: ceph-csi-rbd
        valueFiles:
          - $repo/kubernetes/apps/storage/ceph-csi-rbd/values.yaml
  destination:
    name: in-cluster
    namespace: storage
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
