---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-gateway
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  project: kubernetes
  sources:
    - repoURL: https://ori-edge.github.io/k8s_gateway
      chart: k8s-gateway
      targetRevision: 2.4.0
      helm:
        releaseName: k8s-gateway
        valueFiles:
          - https://raw.githubusercontent.com/fabricesemti80/home-argo-cluster-2025/main/kubernetes/apps/network/k8s-gateway/values.sops.yaml
  destination:
    name: in-cluster
    namespace: network
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: grpcroutes.gateway.networking.k8s.io
      managedFieldsManagers:
        - "kubectl"
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
