---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ceph-csi
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/fabricesemti80/home-argo-cluster-2025.git"
      path: kubernetes/apps/kube-system/ceph-csi
      targetRevision: main
      ref: repo
    - repoURL: ghcr.io/ceph/csi-charts
      chart: ceph-csi-cephfs
      targetRevision: v3.12.0
      helm:
        releaseName: ceph-csi
        valueFiles:
          - $repo/kubernetes/apps/kube-system/ceph-csi/values.sops.yaml
  destination:
    name: in-cluster
    namespace: kube-system
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
