---
version: '3'

# OpenTofu tasks for Talos VM deployment
# These tasks manage the provisioning and destruction of VMs on Proxmox

tasks:

  init:
    desc: Initialize OpenTofu working directory
    dir: '{{.ROOT_DIR}}/terraform'
    cmd: tofu init
    preconditions:
      - which tofu

  validate:
    desc: Validate OpenTofu configuration syntax
    dir: '{{.ROOT_DIR}}/terraform'
    cmd: tofu validate
    preconditions:
      - which tofu
      - test -f {{.ROOT_DIR}}/terraform/versions.tf

  plan:
    desc: Generate OpenTofu execution plan
    dir: '{{.ROOT_DIR}}/terraform'
    cmds:
      - |
        cd {{.ROOT_DIR}}/terraform
        doppler run --project home-argo-cluster-2025 --config dev --name-transformer tf-var -- tofu plan -out=tfplan
    preconditions:
      - which tofu
      - which doppler
      - test -d {{.ROOT_DIR}}/terraform/.terraform

  apply:
    desc: Apply OpenTofu configuration to create VMs (includes plan step)
    dir: '{{.ROOT_DIR}}/terraform'
    cmds:
      - |
        cd {{.ROOT_DIR}}/terraform
        echo "Generating execution plan..."
        doppler run --project home-argo-cluster-2025 --config dev --name-transformer tf-var -- tofu plan -out=tfplan
        echo "Applying configuration..."
        doppler run --project home-argo-cluster-2025 --config dev --name-transformer tf-var -- tofu apply tfplan
    preconditions:
      - which tofu
      - which doppler
      - test -d {{.ROOT_DIR}}/terraform/.terraform

  destroy:
    desc: Destroy VMs and clean up resources
    dir: '{{.ROOT_DIR}}/terraform'
    cmds:
      - |
        cd {{.ROOT_DIR}}/terraform
        doppler run --project home-argo-cluster-2025 --config dev --name-transformer tf-var -- tofu destroy -auto-approve
    preconditions:
      - which tofu
      - which doppler
      - test -d {{.ROOT_DIR}}/terraform/.terraform
